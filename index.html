<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio Ministerio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --dark: #1A1A2E;
    --darker: #12121f;
    --mid: #2D2D4E;
    --text: #E8E8F0;
    --text-muted: #9090B0;
    --accent: #7B5EA7;
    --green: #4CAF7D;
    --red: #E05C5C;
    --border: rgba(201,168,76,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--dark) 0%, var(--mid) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 20px 30px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .logo span { color: var(--text); font-size: 14px; display: block; font-family: 'Lato', sans-serif; font-weight: 300; }

  .search-wrap {
    flex: 1;
    max-width: 500px;
    position: relative;
  }

  #searchInput {
    width: 100%;
    padding: 10px 18px 10px 42px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Lato', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--gold); }
  #searchInput::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  .stats {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .stats strong { color: var(--gold); }

  .container {
    display: flex;
    height: calc(100vh - 74px);
  }

  /* LIST PANEL */
  .list-panel {
    width: 320px;
    min-width: 280px;
    background: var(--dark);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .list-panel::-webkit-scrollbar { width: 5px; }
  .list-panel::-webkit-scrollbar-track { background: transparent; }
  .list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .person-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .person-item:hover { background: rgba(201,168,76,0.07); }
  .person-item.active {
    background: linear-gradient(90deg, rgba(201,168,76,0.2) 0%, rgba(201,168,76,0.05) 100%);
    border-left: 3px solid var(--gold);
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold-light);
    flex-shrink: 0;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .person-info { min-width: 0; flex: 1; }
  .person-name {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .person-area {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .celula-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-yes { background: var(--green); }
  .dot-no { background: var(--red); }
  .dot-none { background: var(--text-muted); opacity: 0.4; }

  /* DETAIL PANEL */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    background: var(--darker);
  }
  .detail-panel::-webkit-scrollbar { width: 5px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 12px;
  }
  .empty-state .icon { font-size: 52px; opacity: 0.3; }
  .empty-state p { font-size: 16px; }

  .card {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    max-width: 760px;
    margin: 0 auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  .card-header {
    background: linear-gradient(135deg, var(--mid), #1e1e38);
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  .photo-area {
    position: relative;
    flex-shrink: 0;
  }

  .photo-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #3a3060);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: 700;
    color: var(--gold-light);
    border: 3px solid var(--gold);
    overflow: hidden;
    cursor: pointer;
    transition: opacity 0.2s;
    position: relative;
  }
  .photo-circle:hover .photo-overlay { opacity: 1; }
  .photo-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 11px;
    color: white;
    gap: 3px;
  }
  .photo-overlay span { font-size: 20px; }
  .photo-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  #photoInput { display: none; }

  .header-info { flex: 1; }
  .header-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .header-area {
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-yes { background: rgba(76,175,125,0.2); color: var(--green); border: 1px solid rgba(76,175,125,0.4); }
  .badge-no  { background: rgba(224,92,92,0.2); color: var(--red); border: 1px solid rgba(224,92,92,0.4); }
  .badge-pre { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid var(--border); }

  .card-body { padding: 24px 28px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--gold);
  }

  input[type=text], input[type=tel], textarea, select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }
  input[type=text]:focus, input[type=tel]:focus, textarea:focus, select:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.08);
  }
  select { appearance: none; cursor: pointer; }
  select option { background: var(--dark); }
  textarea { resize: vertical; min-height: 80px; }

  .card-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #a07830);
    color: var(--darker);
  }
  .btn-gold:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }

  .saved-toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .saved-toast.show { opacity: 1; transform: translateY(0); }

  .no-results {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  @media (max-width: 700px) {
    .container { flex-direction: column; height: auto; }
    .list-panel { width: 100%; height: 260px; }
    .detail-panel { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; }
    .stats { display: none; }
  }
</style>
</head>

// ── Loading overlay ────────────────────────────────────────────────────────
function showLoading(msg) {
  let el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(18,18,31,0.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:Lato,sans-serif;color:#C9A84C;font-size:15px;';
    el.innerHTML = '<div style="font-size:38px;animation:spin 1s linear infinite">⟳</div><div id="loadingMsg"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    document.body.appendChild(el);
  }
  document.getElementById('loadingMsg').textContent = msg || 'Cargando…';
  el.style.display = 'flex';
}
function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display = 'none';
}

// ── Google Sheets sync ─────────────────────────────────────────────────────
async function loadFromSheet() {
  showLoading('Conectando con Google Sheets…');
  try {
    const res = await fetch(SHEET_URL);
    const rows = await res.json();
    if (rows.length > 1) {
      const headers = rows[0];
      const map = {};
      for (let i = 1; i < rows.length; i++) {
        const obj = {};
        headers.forEach((h, j) => { obj[h] = (rows[i][j] || '').toString(); });
        if (obj.NOMBRE && obj.NOMBRE.trim()) map[obj.NOMBRE.trim()] = obj;
      }
      data = data.map(p => {
        const s = map[p.NOMBRE.trim()];
        return s ? { ...p, ...s, _photo: s.FOTO || p._photo || '' } : p;
      });
    }
  } catch(e) {
    console.warn('No se pudo cargar desde Google Sheets:', e);
  }
  hideLoading();
}

async function saveToSheet(p) {
  showLoading('Guardando en Google Sheets…');
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        NOMBRE: p.NOMBRE.trim(),
        TELEFONO: p.TELEFONO || '',
        ASISTE_CELULA: p.ASISTE_CELULA || '',
        TIENE_CELULA: p.TIENE_CELULA || '',
        PROMEDIO_ASISTENCIA: p.PROMEDIO_ASISTENCIA || '',
        NOMBRE_LIDER: p.NOMBRE_LIDER || '',
        NOMBRE_LIDER_RED: p.NOMBRE_LIDER_RED || '',
        AREA_MINISTERIO: p.AREA_MINISTERIO || '',
        OBSERVACIONES: p.OBSERVACIONES || '',
        FOTO: p._photo || ''
      })
    });
  } catch(e) {
    console.warn('Error al guardar:', e);
  }
  hideLoading();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getInitials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0]||'').join('').toUpperCase() || '?';
}
function getCelulaDotClass(val) {
  const v = (val||'').toLowerCase().trim();
  if (v==='si'||v==='sí') return 'dot-yes';
  if (v==='no') return 'dot-no';
  return 'dot-none';
}
function getBadge(label, val) {
  if (!val) return '';
  const v = (val||'').toLowerCase().trim();
  const cls = (v==='si'||v==='sí') ? 'badge-yes' : v==='no' ? 'badge-no' : 'badge-pre';
  return `<span class="badge ${cls}">${label}: ${val.toUpperCase()}</span>`;
}
function showToast() {
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Render list ────────────────────────────────────────────────────────────
function renderList() {
  showCountEl.textContent = filtered.length;
  if (!filtered.length) {
    listPanel.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }
  listPanel.innerHTML = filtered.map(p => {
    const idx = data.indexOf(p);
    const active = idx === selectedIdx ? 'active' : '';
    const dot = getCelulaDotClass(p.ASISTE_CELULA);
    const av = p._photo ? `<img src="${p._photo}" alt="">` : getInitials(p.NOMBRE);
    return `<div class="person-item ${active}" data-idx="${idx}">
      <div class="avatar">${av}</div>
      <div class="person-info">
        <div class="person-name">${p.NOMBRE.trim()}</div>
        <div class="person-area">${p.AREA_MINISTERIO||'—'}</div>
      </div>
      <div class="celula-dot ${dot}"></div>
    </div>`;
  }).join('');
  listPanel.querySelectorAll('.person-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedIdx = parseInt(el.dataset.idx);
      renderList();
      renderDetail(selectedIdx);
    });
  });
}

            <input type="text" id="f_lider_red" value="${p.NOMBRE_LIDER_RED||''}" placeholder="Nombre del líder de red">
          </div>
          <div class="form-group full">
            <label>Área del Ministerio</label>
            <input type="text" id="f_area" value="${p.AREA_MINISTERIO||''}" placeholder="Ej: Coro, Micrófono, Lunch…">
          </div>
          <div class="form-group full">
            <label>Observaciones</label>
            <textarea id="f_obs" placeholder="Notas adicionales…">${p.OBSERVACIONES||''}</textarea>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn btn-outline" id="cancelBtn">Cancelar</button>
        <button class="btn btn-gold" id="saveBtn">💾 Guardar Cambios</button>
      </div>
    </div>`;

  document.getElementById('photoBtn').addEventListener('click', () => document.getElementById('photoInput').click());
  document.getElementById('photoInput').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      data[idx]._photo = ev.target.result;
      await saveToSheet(data[idx]);
      renderDetail(idx); renderList();
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    data[idx].TELEFONO           = document.getElementById('f_tel').value;
    data[idx].ASISTE_CELULA      = document.getElementById('f_asiste').value;
    data[idx].TIENE_CELULA       = document.getElementById('f_tiene').value;
    data[idx].PROMEDIO_ASISTENCIA= document.getElementById('f_prom').value;
    data[idx].NOMBRE_LIDER       = document.getElementById('f_lider').value;
    data[idx].NOMBRE_LIDER_RED   = document.getElementById('f_lider_red').value;
    data[idx].AREA_MINISTERIO    = document.getElementById('f_area').value;
    data[idx].OBSERVACIONES      = document.getElementById('f_obs').value;
    await saveToSheet(data[idx]);
    renderList(); renderDetail(idx); showToast();
  });

  document.getElementById('cancelBtn').addEventListener('click', () => renderDetail(idx));
}

// ── Search ─────────────────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();
  filtered = data.filter(p =>
    p.NOMBRE.toLowerCase().includes(q) ||
    (p.AREA_MINISTERIO||'').toLowerCase().includes(q) ||
    (p.NOMBRE_LIDER||'').toLowerCase().includes(q) ||
    (p.NOMBRE_LIDER_RED||'').toLowerCase().includes(q)
  );
  renderList();
});

// ── Boot ───────────────────────────────────────────────────────────────────
(async () => {
  await loadFromSheet();
  totalCountEl.textContent = data.length;
  filtered = [...data];
  renderList();
})();
</script>
</body>
</html>
